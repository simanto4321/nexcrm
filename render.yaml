# Render Blueprint — NexCRM API
# Deploy: https://dashboard.render.com/select-repo?type=blueprint
services:
  - type: web
    name: nexcrm-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        sync: false
      - key: EMAIL_DEMO_MODE
        value: "false"
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434"
      - key: PYTHON_VERSION
        value: "3.12.8"
